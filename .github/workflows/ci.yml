name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }} · Spatie ${{ matrix.spatie }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*']
        spatie: ['with', 'without']
        include:
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, pdo, pdo_sqlite, sqlite, bcmath, intl
          coverage: none

      - name: Pin framework versions
        run: composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update

      - name: Install dependencies (with Spatie)
        if: matrix.spatie == 'with'
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Install dependencies (without Spatie)
        if: matrix.spatie == 'without'
        run: |
          composer remove --dev spatie/laravel-permission --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Validate composer.json
        run: composer validate --strict

      - name: Run tests
        run: vendor/bin/pest --no-coverage
        if: hashFiles('tests/**/*.php') != ''
